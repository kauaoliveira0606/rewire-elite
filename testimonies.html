    .bg {

    .ray {
      position: absolute;
      width: 1px;
      border-radius: 9999px;
      transform-origin: top center;
      animation: ray-pulse ease-in-out infinite alternate;
    }
    @keyframes ray-pulse {
      0%   { opacity: 0.06; }
      100% { opacity: 0.18; }
    }
    .ray:nth-child(1) { height: 100vh; left: 28%; top: 0; background: linear-gradient(to bottom, rgba(30,10,200,0), rgba(40,20,220,0.6) 40%, rgba(60,30,255,0.9) 70%, rgba(30,10,180,0)); transform: rotate(8deg); animation-duration: 6s; width: 1.5px; }
    .ray:nth-child(2) { height: 85vh; left: 31%; top: 5%; background: linear-gradient(to bottom, rgba(20,5,160,0), rgba(35,15,200,0.4) 50%, rgba(20,5,140,0)); transform: rotate(8.5deg); animation-duration: 8s; animation-delay: 1s; }
    .ray:nth-child(3) { height: 90vh; left: 65%; top: 10%; background: linear-gradient(to bottom, rgba(20,5,170,0), rgba(50,20,240,0.55) 45%, rgba(80,40,255,0.8) 65%, rgba(20,5,150,0)); transform: rotate(11deg); animation-duration: 7s; animation-delay: 2s; width: 1.5px; }

    .meteor {
      position: absolute;
      top: -120px;
      width: 1.5px;
      border-radius: 9999px;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0.9) 50%, rgba(255,255,255,0));
      animation: meteor-fall linear infinite;
    }
    @keyframes meteor-fall {
      0%   { transform: translateY(0) translateX(0) rotate(15deg); opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 0.5; }
      100% { transform: translateY(110vh) translateX(90px) rotate(15deg); opacity: 0; }
    }
    .meteor:nth-child(4)  { left:  4%; height: 70px; animation-duration: 4.2s; animation-delay: 0s;   }
    .meteor:nth-child(5)  { left: 12%; height: 55px; animation-duration: 5.8s; animation-delay: 1.4s; }
    .meteor:nth-child(6)  { left: 22%; height: 85px; animation-duration: 3.9s; animation-delay: 2.8s; }
